    - timeout
    - network
    - service
  opencode:
    max_retries: 2
    backoff_seconds: 0.25
    backoff_multiplier: 2.0
    retry_on:
    - timeout
    - network
    - service
  gemini:
    max_retries: 2
    backoff_seconds: 0.25
    backoff_multiplier: 2.0
    retry_on:
    - timeout
    - network
    - service
  goz:
    max_retries: 2
    backoff_seconds: 0.25
    backoff_multiplier: 2.0
    retry_on:
    - timeout
