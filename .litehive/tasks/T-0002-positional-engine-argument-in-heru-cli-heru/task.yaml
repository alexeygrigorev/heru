goal: Current CLI is 'heru <prompt> --engine codex'. The vision is 'heru codex <prompt>'
  with the engine as a positional subcommand. Switch to a Typer-based CLI where each
  engine is a registered subcommand that shares common options (--cwd, --resume, --model,
  --max-turns). The old form can stay for one release as a deprecated alias.
acceptance_criteria:
- '''heru codex ship it'', ''heru claude ship it'', etc. all work and invoke the correct
  engine'
- Common options (--cwd, --model, --max-turns, --resume, --raw) are shared across
  all engine subcommands
- '''heru --help'' lists all registered engines as subcommands with their own help'
- The old 'heru <prompt> --engine X' form still works but prints a deprecation warning
  on stderr
- CLI tests cover each engine subcommand with a fake engine adapter, asserting argv
  forwarding and exit code
