task_id: T-0002
step: implementing
verdict: pass
source: agent
summary: Implemented a Typer-based heru CLI with one subcommand per engine generated
  from ENGINE_CHOICES, so heru <engine> <prompt> now dispatches through shared option
  handling for --cwd, --model, --max-turns, --resume, and --raw while preserving heru.main.main(argv)
  as the entrypoint. Kept the legacy heru <prompt> --engine <engine> path via a compatibility
  parser that emits a deprecation warning on stderr and still forwards the same run
  arguments. Added CLI coverage across every registered engine subcommand with fake
  adapters, including option forwarding, raw vs unified output, exit code/stdout/stderr
  pass-through, root help, per-engine help, and legacy warning behavior. Updated README
  usage/status and added the Typer runtime dependency with the lockfile refresh from
  uv sync --extra dev. Verified with uv run pytest tests/test_heru_cli.py -q (21 passed),
  uv run pytest -q (52 passed), and the required litehive smoke suite tests/test_runner_workflow.py
  tests/test_engine_variants_and_timeline.py tests/test_heru_cli.py tests/test_codex_quota.py
  -q (197 passed) when run with PYTHONPATH pointing at this heru worktree so litehive
  exercised the changed code.
