summary: 'Validated the positional-engine Typer CLI end to end. Inspected heru/main.py,
  tests/test_heru_cli.py, README.md, and pyproject.toml: engine subcommands are generated
  from ENGINE_CHOICES, shared options are exposed on each subcommand (--cwd, --model,
  --max-turns, --resume, --raw), main(argv) remains the entrypoint, and the legacy
  `heru <prompt> --engine <engine>` path still dispatches through a compatibility
  parser that prints a deprecation warning to stderr. Focused CLI tests use fake adapters
  and assert prompt/argv forwarding, cwd/model/max-turns/resume forwarding, raw vs
  unified behavior, per-engine help, root help, stderr/stdout pass-through, and exit-code
  propagation across every registered engine.'
