feedback: "Verified repo state without code changes. Current CLI in heru/main.py is\
  \ argparse-based with shape `heru <prompt> --engine <engine>`; it forwards `--model`,\
  \ `--cwd`, `--max-turns`, `--resume-session-id`, and `--raw` into `engine.run(...)`.\
  \ README.md already documents the target positional form (`heru codex <prompt>`),\
  \ so docs and code are currently out of sync. Current CLI coverage in tests/test_heru_cli.py\
  \ only exercises the legacy `--engine` path. pyproject.toml currently has no Typer/Click\
  \ dependency, so this task includes an explicit runtime dependency change.\n\nNo\
  \ tests were run in grooming because this stage is repo inspection and task shaping\
  \ only.\n\nPlanner verdict: pass grooming. The task is well-scoped for implementation,\
  \ but the acceptance criteria need one compatibility detail called out: the desired\
  \ public flag is `--resume`, while the current code and tests use `--resume-session-id`.\
  \ Implement the new shared `--resume` option across all engine subcommands, and\
  \ if cost is low keep `--resume-session-id` as a hidden deprecated alias for one\
  \ release to avoid breaking existing callers.\n\nRecommended implementation plan:\n\
  1. Replace the argparse-only CLI shape with a Typer app that registers one subcommand\
  \ per engine from the existing registry / ENGINE_CHOICES instead of duplicating\
  \ engine names.\n2. Keep `heru.main.main(argv)` as the console entrypoint and preserve\
  \ current exit-code/stdout/stderr pass-through behavior.\n3. Add a compatibility\
  \ path for legacy invocations of `heru <prompt> --engine <engine>` inside `main(argv)`\
  \ and emit a deprecation warning to stderr before dispatching.\n4. Share one option\
  \ bundle across all engine subcommands for `--cwd`, `--model`, `--max-turns`, `--resume`,\
  \ and `--raw`.\n5. Expand CLI tests to cover every registered engine subcommand\
  \ with fake adapters, plus `heru --help`, `heru <engine> --help`, raw vs unified\
  \ output, exit code propagation, and deprecated legacy-path warning behavior.\n\
  6. Update README usage/help examples and add the minimal explicit runtime dependency\
  \ changes needed for Typer/Click.\n\nSizing recommendation: PM complexity `moderate`,\
  \ planned effort `m`, task type `refactor`.\n\nI attempted to persist these shaping\
  \ updates with `litehive task update T-0002`, but Litehive rejected the mutation\
  \ because the runner currently holds the task state lock (`runtime.execution_status=running`).\
  \ Carry this TASK_UPDATE forward manually if needed:\n\nTASK_UPDATE:\n  pm_complexity:\
  \ moderate\n  planned_effort: m\n  task_type: refactor\n  acceptance_criteria:\n\
  \    - For every registered engine in ENGINE_CHOICES, `heru <engine> <prompt>` invokes\
  \ the matching adapter and forwards the prompt and common options correctly.\n \
  \   - Each engine subcommand accepts the shared options `--cwd`, `--model`, `--max-turns`,\
  \ `--resume`, and `--raw`, and the engine-specific help shows that shared option\
  \ set.\n    - `heru --help` lists all registered engines as subcommands, and `heru\
  \ <engine> --help` succeeds for each engine.\n    - The legacy form `heru <prompt>\
  \ --engine <engine>` still works for one release and emits a deprecation warning\
  \ to stderr before delegating to the selected engine.\n    - CLI tests use fake\
  \ adapters to cover every registered engine subcommand plus the deprecated entrypoint,\
  \ asserting forwarded argv/options, warning behavior, raw vs unified output handling,\
  \ and exit code.\n  constraints:\n    - Keep changes scoped to the CLI entrypoint,\
  \ packaging, documentation, and focused CLI tests; do not change adapter semantics\
