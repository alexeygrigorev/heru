  \ as the console entrypoint and keep the current exit-code/stdout/stderr pass-through\
  \ behavior.\n    - Generate engine subcommands from the existing registry or ENGINE_CHOICES\
  \ rather than duplicating engine names in multiple places.\n  plan:\n    - Inspect\
  \ the current argparse CLI, existing CLI tests, and engine registry to preserve\
  \ the public contract while introducing positional engine subcommands.\n    - Replace\
  \ the argparse-only shape with a Typer-based CLI that registers one subcommand per\
  \ engine and shares the common option bundle.\n    - Keep a compatibility path for\
  \ the legacy `--engine` form inside `main(argv)` and emit a deprecation warning\
  \ on stderr.\n    - Normalize the public resume flag to `--resume`; if implementation\
