goal: 'heru''s codex adapter reader truncates JSONL lines containing large aggregated_output
  fields, producing ''Unterminated string'' parse errors and silently dropping item.completed
  events. Find the line-length / buffer cap in the codex stream reader and raise or
  remove it so full events make it to downstream consumers. Also dedupe the skip-logging:
  each truncated line is currently logged 6-10 times by overlapping layers (codex:,
  iter_jsonl_payloads:).'
acceptance_criteria:
- Codex events with aggregated_output > 8KB parse successfully end-to-end
- No duplicate skip-log messages for a single malformed/truncated line
- Regression test with a fixture containing a large aggregated_output line
- litehive contract tests still pass
constraints:
- Prefer the smallest change that removes the failure mode.
