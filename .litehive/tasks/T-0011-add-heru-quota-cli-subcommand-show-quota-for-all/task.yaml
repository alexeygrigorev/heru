id: T-0011
slug: add-heru-quota-cli-subcommand-show-quota-for-all
title: 'Add ''heru quota'' CLI subcommand: show quota for all or one engine'
created_at: '2026-04-10T20:49:26+00:00'
task_type: adapter
pipeline_mode: full
priority: medium
depends_on: []
goal: "Add a new CLI subcommand to heru: 'heru quota' prints quota status for every\
  \ registered provider (codex, claude, copilot, zai which covers opencode+goz), and\
  \ 'heru quota <name>' prints quota for one. Build on the existing heru/quota/ Python\
  \ API (check_codex_quota, check_claude_quota, check_copilot_quota, check_zai_quota,\
  \ and their *_block_reason helpers). Output should be human-readable by default\
  \ \u2014 one line per provider showing used/limit/remaining/unit, reset window,\
  \ and a clear indicator when a block_reason is active. Add a --json flag for machine-readable\
  \ output. Handle providers with no quota support (gemini) by printing 'unsupported'\
  \ rather than erroring. Handle auth failures (missing token) by printing the provider-specific\
  \ reason rather than crashing. Add fixture-driven tests under tests/ that mock each\
  \ provider's check_* function; do not hit any real network. Update README to document\
  \ the new subcommand."
acceptance_criteria:
- '''heru quota'' (no args) prints one line per supported provider: codex, claude,
  copilot, zai'
- '''heru quota codex'' / ''heru quota claude'' / ''heru quota copilot'' / ''heru
  quota zai'' each prints quota for that single provider'
- '''heru quota gemini'' prints an ''unsupported'' notice rather than crashing'
- '''heru quota <unknown>'' prints a helpful error listing valid provider names and
  exits non-zero'
- Output includes used, limit, remaining, unit, reset window, and active block_reason
  if any
- --json flag emits machine-readable output (one JSON object per provider, or a single
  object for the single-provider form)
- Missing auth / missing credential file is reported per-provider, not as a crash
- "Fixture-driven tests under tests/ cover success, unsupported, unknown-name, missing-auth,\
  \ and --json paths \u2014 zero real network calls"
- README documents 'heru quota' and 'heru quota <name>'
- uv run pytest tests/ passes
- litehive contract tests from ~/git/litehive still pass
constraints:
- Keep provider-specific behavior isolated to the adapter boundary.
- Preserve deterministic workspace state and execution flow.
plan:
- Inspect the existing adapter interface, config wiring, and invocation flow.
- Implement the adapter change close to the integration seam.
- Verify the adapter path with a focused test or representative run.
