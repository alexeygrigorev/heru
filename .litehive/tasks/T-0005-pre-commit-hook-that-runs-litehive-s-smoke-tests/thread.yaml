    first on PATH, 5) run ''bash scripts/pre-commit.sh'', 6) observe that it exits
    successfully without running uv. Acceptance criteria status: satisfied - versioned
    hook exists under scripts/pre-commit.sh, installer exists under scripts/install-hooks.sh
