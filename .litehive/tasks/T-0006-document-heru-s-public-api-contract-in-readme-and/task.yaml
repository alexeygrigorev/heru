id: T-0006
slug: document-heru-s-public-api-contract-in-readme-and
title: Document heru's public API contract in README and docstrings
created_at: '2026-04-10T18:53:09+00:00'
task_type: null
pipeline_mode: full
priority: medium
depends_on:
- T-0005
goal: heru is used by litehive and (per the vision) by other callers via 'pip install
  heru' or 'heru <engine> <prompt>'. Without a clear public API boundary, every identifier
  looks stable and any change is scary. Explicitly document which classes, methods,
  functions, and types are part of the stable public contract vs internal (the _prefixed
  modules, internal helpers, etc). The public contract is what heru commits to preserving
  across versions. Internal modules can change freely. This makes 'breaking change'
  vs 'internal refactor' an objective classification.
acceptance_criteria:
- "README has an 'API Contract' section listing every stable public name \u2014 ExternalCLIAdapter,\
  \ CLIInvocation, CLIExecutionResult, get_engine, ENGINE_CHOICES, the six adapter\
  \ classes, the types in heru.types \u2014 with a one-line description of what each\
  \ guarantees"
- The same section explicitly marks which modules are internal (any _prefixed module
  like _codex_impl, _engine_detection, _continuation) and may change without notice
- Each public class and function gets a module-level docstring that calls out its
  public status and what callers can rely on
- "A stability matrix is added showing heru version \u2192 what broke in which public\
  \ API, to establish a track record of semver discipline going forward"
- 'A brief ''how to submit a breaking change'' note: semver bump, CHANGELOG entry,
  migration note for litehive (and any other known consumer)'
