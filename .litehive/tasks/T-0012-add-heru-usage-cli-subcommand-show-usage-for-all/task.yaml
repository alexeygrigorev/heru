goal: "Add a new CLI subcommand to heru: 'heru usage' prints usage/quota status for\
  \ every registered provider (codex, claude, copilot, zai which covers opencode+goz),\
  \ and 'heru usage <name>' prints it for one. Build on the existing heru/quota/ Python\
  \ API (check_codex_quota, check_claude_quota, check_copilot_quota, check_zai_quota,\
  \ and the matching *_block_reason helpers \u2014 keep the internal module name 'quota'\
  \ since that's what the provider APIs call it; only the CLI verb is 'usage'). Output\
  \ should be human-readable by default \u2014 one line per provider showing used/limit/remaining/unit,\
  \ reset window, and a clear indicator when a block_reason is active. Add a --json\
  \ flag for machine-readable output. Handle providers with no usage endpoint (gemini)\
  \ by printing 'unsupported' rather than erroring. Handle auth failures (missing\
  \ token) by printing the provider-specific reason rather than crashing. Add fixture-driven\
  \ tests under tests/ that mock each provider's check_* function; do not hit any\
  \ real network. Update README to document the new subcommand."
acceptance_criteria:
- '''heru usage'' (no args) prints one line per supported provider: codex, claude,
  copilot, zai'
- '''heru usage codex'' / ''heru usage claude'' / ''heru usage copilot'' / ''heru
  usage zai'' each prints usage for that single provider'
- '''heru usage gemini'' prints an ''unsupported'' notice rather than crashing'
- '''heru usage <unknown>'' prints a helpful error listing valid provider names and
  exits non-zero'
- Output includes used, limit, remaining, unit, reset window, and active block_reason
  if any
- --json flag emits machine-readable output (one JSON object per provider, or a single
  object for the single-provider form)
- Missing auth / missing credential file is reported per-provider, not as a crash
- "Fixture-driven tests under tests/ cover success, unsupported, unknown-name, missing-auth,\
  \ and --json paths \u2014 zero real network calls"
- README documents 'heru usage' and 'heru usage <name>'
- heru/quota/ module name is unchanged (internal naming stays consistent with provider
  APIs)
- uv run pytest tests/ passes
- litehive contract tests from ~/git/litehive still pass
constraints:
- Keep provider-specific behavior isolated to the adapter boundary.
- Preserve deterministic workspace state and execution flow.
plan:
- Inspect the existing adapter interface, config wiring, and invocation flow.
