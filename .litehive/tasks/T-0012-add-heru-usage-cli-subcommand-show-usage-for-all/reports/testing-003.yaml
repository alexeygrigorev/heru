summary: 'Verified the new CLI adapter seam at heru/main.py for ''heru usage'' and
  the added fixture-driven coverage in tests/test_heru_cli.py. Confirmed the command
  supports the all-provider form and single-provider form for codex, claude, copilot,
  and zai; accepts gemini and reports unsupported without crashing; returns a non-zero
  helpful error for unknown providers; includes used, limit, remaining, unit, reset
  window/reset time, and active block_reason in output; reports provider auth failures
  via the provider error text instead of crashing; and emits machine-readable JSON
  with --json. Verified README documents ''heru usage'', ''heru usage <name>'', ''--json'',
  and gemini unsupported behavior. Test evidence: ''uv run pytest tests/test_heru_cli.py
