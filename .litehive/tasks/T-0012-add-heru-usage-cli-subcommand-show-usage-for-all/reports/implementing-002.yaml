summary: 'Implemented a new top-level ''heru usage'' CLI subcommand in heru/main.py
  without changing the internal heru/quota module naming. Added provider normalization
  for codex, claude, copilot, zai, and gemini (unsupported), human-readable one-line
  output, single-provider form, JSON output, helpful unknown-provider errors, and
  non-crashing error reporting for missing auth or missing credential state via the
  provider check_* helpers and block_reason helpers. Added fixture-driven CLI tests
  in tests/test_heru_cli.py covering all-provider output, single-provider output,
  gemini unsupported, unknown provider non-zero exit, missing-auth reporting, and
  --json output using monkeypatched quota helpers only; no network calls. Updated
  README usage docs for ''heru usage'', ''heru usage <name>'', ''--json'', and gemini
  unsupported behavior. Verification: ''uv run pytest tests/ -q'' passed (243 passed),
  and the required litehive smoke suite passed from ~/git/litehive: ''uv run pytest
  tests/test_runner_workflow.py tests/test_engine_variants_and_timeline.py tests/test_heru_cli.py
  tests/test_codex_quota.py -q'' (198 passed, 3 warnings).'
