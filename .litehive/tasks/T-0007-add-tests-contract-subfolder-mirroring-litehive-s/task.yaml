goal: "Split heru's test layout into two top-level folders: (1) tests/ \u2014 standalone,\
  \ fixture-only, no 'from litehive' imports, no real subprocess calls to engine CLIs;\
  \ runs in heru's own venv via 'uv run pytest tests/'. (2) tests_integration/ \u2014\
  \ contract tests that import/exercise litehive and may call real engine CLIs; these\
  \ guard the public API contract that litehive depends on and are NOT run by default.\
  \ Move any contract-style tests that currently violate the tests/ standalone rule\
  \ into tests_integration/. Update CLAUDE.md and .litehive/context.md to document\
  \ the split and update the pre-commit / contract-test invocation to include tests_integration/\
  \ where appropriate."
acceptance_criteria:
- tests/ contains zero 'from litehive' imports and zero real engine subprocess calls
- tests_integration/ exists at repo root with at least one contract test mirroring
  litehive's public-API expectations of heru
- CLAUDE.md documents the tests/ vs tests_integration/ split and when each runs
- .litehive/context.md updated to reflect the new layout
- uv run pytest tests/ still passes standalone (no litehive checkout needed)
- litehive's own contract test suite still passes when run from ~/git/litehive
