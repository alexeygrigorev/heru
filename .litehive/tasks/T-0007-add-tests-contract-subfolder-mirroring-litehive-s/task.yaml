goal: 'The pre-commit hook (T-0005) runs litehive''s contract tests before commits,
  which is great but requires litehive to be present. For heru standalone users and
  CI environments without litehive, mirror the critical contract tests into heru''s
  own test suite under tests/contract/. These test heru''s public API directly (build_invocation
  returns the right argv shape, extract_usage_observation parses fixture payloads
  correctly, extract_continuation returns the expected session ids, ExternalCLIAdapter.run
  handles timeouts correctly, etc). They are complementary to the litehive-based pre-commit
  hook, not replacements. The difference: tests/contract/ runs in heru alone, the
  litehive hook runs integration scenarios that need litehive scaffolding.'
acceptance_criteria:
- 'tests/contract/ subdirectory exists with at least 30 tests exercising the public
  API surface: ExternalCLIAdapter methods, each adapter''s build_invocation/render_transcript/extract_usage_observation/extract_continuation,
  the public type constructors in heru.types'
- "Every test in tests/contract/ uses only fixture-based inputs \u2014 no real engine\
  \ subprocess, no network. Pure unit tests against the public API"
- "README explains that tests/contract/ is the 'thou shalt not break' suite \u2014\
  \ any PR that changes a test in this directory is a semver-major breaking change\
  \ and requires the checklist in T-0006 (CHANGELOG, migration note, version bump)"
- tests/contract/ is wired into the default pytest run ('uv run pytest' picks it up)
- These tests pass on a completely fresh venv with only heru and pytest installed
  (no litehive, no engine CLIs, no network)
