summary: 'Accepted. I verified the implementation against the acceptance criteria
  by inspecting the CLI and adapter changes in heru/main.py, heru/base.py, heru/adapters/codex.py,
  heru/adapters/claude.py, heru/adapters/copilot.py, heru/adapters/gemini.py, heru/adapters/opencode.py,
  heru/adapters/goz.py, and heru/adapters/_copilot_impl.py, plus the focused tests
  in tests/test_heru_cli.py, tests/test_unified_events.py, tests/test_resume_adapters.py,
  and tests/test_goz_adapter.py. Evidence confirms that every engine subcommand accepts
  --resume <id> and forwards resume_session_id, supported engines map unified --continue
  to their native latest-session mechanism, and goz cleanly rejects --continue with
  an explicit-id error path. I also verified that unified JSONL rendering now suppresses
  intermediate continuation events and appends exactly one final continuation event
  containing the finished session id at end of run, and that Copilot now surfaces
  continuation ids into the unified stream. Independent verification run in this reviewer
  session: PYTHONPATH=$PWD uv run --active pytest tests/test_heru_cli.py tests/test_unified_events.py
  tests/test_resume_adapters.py tests/test_goz_adapter.py -q -> 62 passed. Required
  litehive contract smoke rerun in this reviewer session: PYTHONPATH=/home/alexey/git/heru/.litehive/worktrees/T-0003-unified-resume-continue-across-all-engines
  uv run pytest tests/test_runner_workflow.py tests/test_engine_variants_and_timeline.py
  tests/test_heru_cli.py tests/test_codex_quota.py -q -> 197 passed. The two-run resume
  flow is covered at CLI level across engines by capturing the first run continuation_id
  and reusing it on the second run to confirm prior-context continuation behavior.'
