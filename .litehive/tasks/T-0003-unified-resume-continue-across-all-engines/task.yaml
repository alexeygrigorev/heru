goal: Every supported engine has native session resume (codex exec resume, claude
  --resume, gemini --resume, copilot --continue/--resume, opencode --session/--continue,
  goz --resume-session). Heru's adapters accept a resume_session_id parameter and
  each adapter emits the right CLI flag for its engine. Expose this at the CLI level
  with a unified --resume <id> flag that works for every engine subcommand, plus --continue
  that resumes the most recent session per engine. The unified event stream must emit
  a continuation event containing the current session id so callers can capture it
  for the next run.
acceptance_criteria:
- Each engine subcommand accepts --resume <id> and forwards to the underlying native
  resume mechanism, producing a session that continues the prior conversation with
  full context
- Each engine subcommand accepts --continue (no id) that resolves to 'most recent
  session for this engine' and resumes it (for engines where that is a native concept;
  error for engines that require an explicit id)
- The unified JSONL stream (from T-0001) emits a 'continuation' event at the end of
  every run containing the session_id of the finished session, so callers can pass
  it to --resume on the next run without scraping logs
- 'Integration test: run ''heru codex hi'', capture the continuation session id from
  the output, then run ''heru codex --resume <id> what did we discuss'' and assert
  it references the prior turn'
- Same test repeated for each engine with a real or fake adapter
