summary: 'Accepted. Verified the implementation against the task criteria in code
  and by running the required tests. Confirmed a public UnifiedEvent model exists
  in heru/types.py and is exported from heru/__init__.py; it carries the common envelope
  fields including kind, engine, sequence, timestamp, role, content, tool_name, tool_input,
  tool_output, error, usage_delta, continuation_id, raw, and metadata. Confirmed ExternalCLIAdapter.run
  and run_live both accept emit_unified and route stdout through render_unified_output
  when enabled, while heru/main.py now defaults CLI output to unified JSONL and preserves
  native passthrough behind --raw. Confirmed each supported adapter exposes the translation
  hook path through translate_native_event/translate_native_events and the shared
  stream adapter layer, with codex using iter_codex_payloads for multiline native
  objects and continuation ids preserved where emitted. Reviewed README.md and confirmed
  it documents the unified event schema, default unified behavior, and --raw fallback.
  Verification run: uv run pytest -q tests/test_unified_events.py tests/test_heru_cli.py
