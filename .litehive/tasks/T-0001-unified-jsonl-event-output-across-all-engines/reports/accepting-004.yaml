  tests/test_heru_cli.py tests/test_codex_quota.py -> 197 passed. This is sufficient
  evidence that the requested unified JSONL envelope is emitted by default across
  engines, native payloads are preserved under raw, representative per-adapter translations
  are covered by tests, and Litehive contract behavior remains green.'
